# Autonomous-GLM Default Configuration
# Base configuration with all defaults - environment-specific files override these

# Application Settings
app:
  name: autonomous-glm
  version: "0.1.0"
  environment: development
  debug: false

# Path Configuration
# All paths are relative to project root unless absolute
paths:
  data_dir: "./data"
  artifacts_dir: "./data/artifacts"
  screenshots_dir: "./data/artifacts/screenshots"
  videos_dir: "./data/artifacts/videos"
  context_dir: "./data/artifacts/context"
  logs_dir: "./logs"
  output_dir: "./output"
  reports_dir: "./output/reports"
  design_system_dir: "./design_system"
  memory_bank_dir: "./memory-bank"
  database_path: "./data/autonomous_glm.db"

# Database Configuration
database:
  pool_size: 5
  timeout: 30  # seconds

# Agent Protocol Configuration
agent_protocol:
  message_timeout: 5000  # milliseconds
  retry_attempts: 3
  retry_base_delay: 1000  # milliseconds
  retry_max_delay: 1800000  # milliseconds (30 minutes max)

# Individual Agent Settings
agents:
  claude:
    enabled: true
    endpoint: null  # Optional custom endpoint
  minimax:
    enabled: true
    endpoint: null
  codex:
    enabled: true
    endpoint: null

# Computer Vision Pipeline
cv_pipeline:
  model: glm-5-vision
  detection_threshold: 0.95
  batch_size: 10

vision:
  model: gpt-4o
  max_tokens: 4096
  temperature: 0.1
  confidence_threshold: 0.5
  rate_limit_per_minute: 60
  retry_attempts: 3
  retry_base_delay_ms: 1000
  retry_max_delay_ms: 30000

# Audit Configuration
audit:
  dimensions:
    - visual_hierarchy
    - spacing_rhythm
    - typography
    - color
    - alignment_grid
    - components
    - iconography
    - motion_transitions
    - empty_states
    - loading_states
    - error_states
    - dark_mode_theming
    - density
    - responsiveness
    - accessibility
  severity_thresholds:
    low: 0.0
    medium: 0.4
    high: 0.7
    critical: 0.9

# Ingestion Configuration
ingestion:
  max_file_size_mb: 50.0
  min_width: 100
  min_height: 100
  max_width: 10000
  max_height: 10000
  allowed_formats:
    - png
    - jpeg
    - jpg

# Video Ingestion Configuration
video_ingestion:
  max_file_size_mb: 500.0
  max_duration_seconds: 1800  # 30 minutes
  max_width: 10000
  max_height: 10000
  allowed_containers:
    - mp4
    - mov
  allowed_codecs:
    - h264
    - h265
    - hevc
    - vp8
    - vp9
  extraction_interval: 1.0  # seconds between frames (1 fps)
  max_frames: 500

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_rotation: "10 MB"
  file_count: 5