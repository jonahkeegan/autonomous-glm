[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async mode for pytest-asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output settings
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, external deps)
    slow: Slow tests (skip in quick runs)
    e2e: End-to-end tests (full workflows)
    ci_quick: Fast E2E tests suitable for CI

# Coverage settings (when using pytest-cov)
# Run with: pytest --cov=src --cov-report=term-missing

# Minimum version
minversion = 7.0

# Ignore certain directories
norecursedirs = .git .venv venv node_modules __pycache__ *.egg

# Logging
log_cli = false
log_cli_level = INFO

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning