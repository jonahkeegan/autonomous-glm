name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src/ tests/ --output-format=github

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  test-unit:
    name: Unit Tests
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: brew install pango gdk-pixbuf libffi || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            -v \
            --tb=short

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  test-integration:
    name: Integration Tests
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: brew install pango gdk-pixbuf libffi || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --timeout=60

  test-e2e:
    name: E2E Tests (CI Quick)
    runs-on: macos-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: brew install pango gdk-pixbuf libffi || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run E2E tests (ci_quick marker only)
        run: |
          pytest tests/e2e/ \
            -m "ci_quick" \
            -v \
            --tb=short \
            --timeout=120

  coverage-gate:
    name: Coverage Gate
    runs-on: macos-latest
    needs: [test-unit, test-integration, test-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: .
        continue-on-error: true

      - name: Run full test suite with coverage
        run: |
          pytest tests/unit/ tests/integration/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -q

      - name: Check coverage threshold (80%)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import sys
          try:
              tree = ET.parse('coverage.xml')
              root = tree.getroot()
              line_rate = float(root.attrib.get('line-rate', 0))
              coverage_pct = line_rate * 100
              print(f'Total coverage: {coverage_pct:.2f}%')
              if coverage_pct < 80.0:
                  print(f'Coverage {coverage_pct:.2f}% is below 80% threshold')
                  sys.exit(1)
              else:
                  print(f'Coverage {coverage_pct:.2f}% meets 80% threshold')
          except FileNotFoundError:
              print('Coverage file not found, skipping gate')
          except Exception as e:
              print(f'Error checking coverage: {e}')
          "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # Summary job for branch protection
  ci-success:
    name: CI Success
    runs-on: macos-latest
    needs: [lint, test-unit, test-integration, test-e2e, coverage-gate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test-unit.result }}" != "success" || \
                "${{ needs.test-integration.result }}" != "success" || \
                "${{ needs.test-e2e.result }}" != "success" || \
                "${{ needs.coverage-gate.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"